<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subway Routine Timer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app-shell">
      <section class="panel editor-panel">
        <h1>Subway Routine Timer</h1>
        <p class="subtitle">Plan your routine as a transit line, then ride it in real time.</p>

        <label for="templateSelect">Template</label>
        <div class="row">
          <select id="templateSelect"></select>
          <button id="loadTemplateBtn" type="button">Load</button>
          <button id="saveTemplateBtn" type="button">Save Line</button>
        </div>

        <label for="routineName">Routine Name</label>
        <input id="routineName" type="text" placeholder="Morning Express" />

        <label for="stepsInput">Steps (one per line: activity,minutes)</label>
        <textarea
          id="stepsInput"
          rows="10"
          placeholder="Brush teeth,10&#10;Get dressed,10&#10;Eat breakfast,15"
        ></textarea>

        <div class="controls">
          <button id="buildBtn" type="button">Build Line</button>
          <button id="startBtn" type="button">Start Run</button>
          <button id="pauseBtn" type="button">Pause</button>
          <button id="resumeBtn" type="button">Resume</button>
          <button id="skipBtn" type="button">Skip Stop</button>
          <button id="resetBtn" type="button">Reset</button>
        </div>

        <div class="speed-box">
          <label for="speedSlider">Speed: <span id="speedValue">Real-time</span></label>
          <input id="speedSlider" type="range" min="1" max="11" value="11" />
        </div>
      </section>

      <section class="panel map-panel">
        <header class="status-head">
          <div class="line-badge-wrap">
            <div id="lineBadge" class="line-badge">R</div>
            <h2 id="lineTitle">No route loaded</h2>
          </div>
          <div class="timer-stack">
            <div id="countdown" class="countdown">--:--</div>
            <div id="delayTimer" class="delay-timer">Delay 00:00</div>
          </div>
        </header>

        <div id="announcement" class="announcement">Build and start a routine to hear station announcements.</div>

        <div class="map-wrap">
          <div class="shortcut-key map-shortcuts">
            <h3>Keyboard</h3>
            <p><kbd>D</kbd> delay <kbd>N</kbd> next <kbd>P</kbd> previous</p>
          </div>
          <svg id="mapSvg" viewBox="0 0 1000 520" role="img" aria-label="Routine subway map"></svg>
        </div>

        <section class="history">
          <div class="history-head">
            <h3>Actual Times</h3>
            <button id="useActualBtn" type="button">Use Actuals For Next Run</button>
          </div>
          <div id="historyTableWrap" class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>From</th>
                  <th>To</th>
                  <th>Planned</th>
                  <th>Actual</th>
                  <th>Delay</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
